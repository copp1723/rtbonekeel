name: TypeScript Error Tracking

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 0 * * 1' # Run weekly on Mondays

jobs:
  track-ts-errors:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run TypeScript error tracking
        run: |
          ./track-ts-errors.sh
          
      - name: Upload error report
        uses: actions/upload-artifact@v3
        with:
          name: ts-error-report
          path: |
            ts-errors.log
            ts-errors-summary.md
            
      - name: Compare with previous error count
        if: github.event_name == 'pull_request'
        run: |
          # Get current error count
          CURRENT_COUNT=$(grep -c "error TS" ts-errors.log || echo 0)
          
          # Checkout base branch to compare
          git checkout ${{ github.base_ref }}
          
          # Run TypeScript check on base branch
          ./track-ts-errors.sh
          
          # Get base error count
          BASE_COUNT=$(grep -c "error TS" ts-errors.log || echo 0)
          
          # Calculate difference
          DIFF=$((CURRENT_COUNT - BASE_COUNT))
          
          # Output results
          echo "TypeScript Error Change: $DIFF"
          echo "Base branch errors: $BASE_COUNT"
          echo "Current branch errors: $CURRENT_COUNT"
          
          # Create status check
          if [ $DIFF -gt 0 ]; then
            echo "::error::TypeScript errors increased by $DIFF"
            exit 1
          elif [ $DIFF -lt 0 ]; then
            echo "::notice::TypeScript errors decreased by $((-DIFF))"
          else
            echo "::notice::TypeScript error count unchanged"
          fi
          
      - name: Generate weekly report
        if: github.event_name == 'schedule'
        run: |
          npm run ts-error-report:weekly
          
      - name: Upload weekly report
        if: github.event_name == 'schedule'
        uses: actions/upload-artifact@v3
        with:
          name: ts-weekly-report
          path: ts-error-trend-report.md